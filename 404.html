<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Page Not Found | HMJ Global</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6ff;
      --panel: rgba(255, 255, 255, 0.96);
      --ink: #10214d;
      --muted: #526489;
      --accent: #234a99;
      --border: rgba(35, 74, 153, 0.12);
      --shadow: 0 24px 56px rgba(16, 33, 77, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font: 16px/1.6 Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(35, 74, 153, 0.15), transparent 36%),
        linear-gradient(180deg, #f8faff 0%, var(--bg) 100%);
    }
    main {
      width: min(92vw, 560px);
      padding: 36px 32px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .eyebrow {
      margin: 0 0 10px;
      font: 700 0.8rem/1.2 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.05;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font: 700 0.95rem/1.2 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">HMJ Global</p>
    <h1>Page not found</h1>
    <p>The page or file you requested is not available on this website.</p>
    <a href="/">Return to HMJ Global</a>
  </main>
</body>
</html>
