[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# ---------------------------------------------------------------------------
# Security headers — applied globally then tightened for /admin/*.
#
# Admin still carries some inline scripts/styles, so the current CSP keeps
# `'unsafe-inline'` for compatibility while still locking execution down to
# HMJ-controlled origins plus the Netlify Identity / jsDelivr dependencies used
# by the current admin bundle. Follow-up work should keep shrinking the inline
# surface until `'unsafe-inline'` can be removed entirely.
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "DENY"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), interest-cohort=()"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "DENY"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Cache-Control             = "no-store, no-cache, must-revalidate"
    Content-Security-Policy   = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://identity.netlify.com https://cdn.jsdelivr.net; connect-src 'self' https:; frame-src 'self' https://identity.netlify.com"

[functions]
  node_bundler = "esbuild"
  included_files = ["data/*.json", "netlify/functions/_data/*.json"]

# QuickBooks OAuth callback bridge:
# - Public callback path: /api/connectors/quickbooks/callback
# - Required Netlify env var: HMJ_ASSISTANT_QBO_CALLBACK_TARGET
# - Optional Netlify env var: HMJ_ASSISTANT_QBO_ALLOWED_HOSTS
# - Intuit redirect URI must be: https://hmj-global.com/api/connectors/quickbooks/callback
[[redirects]]
  from = "/api/connectors/quickbooks/callback"
  to = "/.netlify/functions/quickbooks-callback-bridge"
  status = 200

[functions."admin-team-tasks-reminders-run"]
