[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"
  included_files = ["data/*.json", "netlify/functions/_data/*.json"]

[functions."admin-team-tasks-reminders-run"]
  schedule = "@hourly"

[functions."admin-annual-leave-reminders-run"]
  schedule = "@hourly"

[[redirects]]
  from = "/go/:slug"
  to = "/.netlify/functions/short-link-go?slug=:slug"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/jobs"
  to = "/jobs.html"
  status = 200

[[redirects]]
  from = "/candidates"
  to = "/candidates.html"
  status = 200

[[redirects]]
  from = "/clients"
  to = "/clients.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/apply"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/client-contact"
  to = "/client-contact.html"
  status = 200

[[redirects]]
  from = "/timesheets"
  to = "/timesheets.html"
  status = 200

# Keep /admin/ public as the single sign-in entry, but require an admin
# role for the actual tool pages. Non-admin visitors are sent back to the
# dashboard gate with a safe continuation target.
[[redirects]]
  from = "/admin/assignments.html"
  to = "/admin/assignments.html"
  status = 200
  conditions = { Role = ["admin"] }

[[redirects]]
  from = "/admin/assignments.html"
  to = "/admin/?next=assignments.html"
  status = 302

